<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunidade Master Mind</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <h2>Comunidade Master Mind</h2>

  <nav id="mainNav">
    <a href="#inicio">Início</a>
    <a href="#membros">Área de Membros</a>
    <a href="#produtos">Produtos</a>
    <a href="#materiais">Materiais</a>
    <a href="#vip">VIP</a>
    <a href="#admin">Admin</a>
  </nav>

  <button id="menuBtn">☰</button>

  <!-- BOTÃO CORRETO -->
  <button id="openAuthBtn" class="btn">Entrar</button>
</header>

<!-- HERO -->
<section id="inicio" class="hero">
  <h1>Construa renda na internet com uma comunidade forte</h1>
  <p>Aprenda, compartilhe e cresça com outros membros.</p>
</section>

<!-- MODAL DE LOGIN -->
<div class="modal hidden" id="authModal">
  
  <div class="modal-backdrop" id="closeAuthBackdrop"></div>

  <div class="modal-card">

    <button id="closeAuthBtn" class="modal-close">×</button>

    <!-- ABAS -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="register">Cadastro</button>
      <button class="tab-btn" data-tab="login">Login</button>
    </div>

    <div id="messageBox" class="message hidden"></div>

    <!-- CADASTRO -->
    <form id="registerForm">
      <input id="registerNome" placeholder="Nome completo" required>
      <input id="registerEmail" placeholder="Email" required>
      <input id="registerTelefone" placeholder="Telefone" required>
      <input id="registerCpf" placeholder="CPF" required>
      <input id="registerSenha" type="password" placeholder="Senha" required>
      <button type="submit">Criar conta</button>
    </form>

    <!-- LOGIN -->
    <form id="loginForm" class="hidden">
      <input id="loginEmail" placeholder="Email" required>
      <input id="loginSenha" type="password" placeholder="Senha" required>
      <button type="submit">Entrar</button>
    </form>

  </div>
</div>

<!-- ÁREA MEMBROS -->
<section id="membros">
  <h2>Área de Membros</h2>
  <p id="profileNome"></p>
  <p id="profileEmail"></p>
  <p id="profileNivel"></p>
  <p id="profileStatus"></p>
</section>

<!-- POSTS -->
<section>
  <h2>Comunidade</h2>
  <form id="postForm">
    <textarea id="postContent"></textarea>
    <button type="submit">Publicar</button>
  </form>
  <div id="postsList"></div>
  <button id="refreshPostsBtn">Atualizar</button>
</section>

<!-- PRODUTOS -->
<section id="produtos">
  <h2>Produtos</h2>

  <div id="productFormCard">
    <form id="productForm">
      <input id="productTitle" placeholder="Nome">
      <input id="productDescription" placeholder="Descrição">
      <input id="productCheckout" placeholder="Link checkout">
      <input id="productMemberName" placeholder="Seu nome">
      <input id="productWhatsapp" placeholder="WhatsApp">
      <select id="productVisibility">
        <option value="publico">Público</option>
        <option value="vip">VIP</option>
      </select>
      <button type="submit">Cadastrar</button>
    </form>
  </div>

  <div id="productsList"></div>
  <button id="refreshProductsBtn">Atualizar</button>
</section>

<!-- MATERIAIS -->
<section id="materiais">
  <h2>Materiais</h2>

  <div id="materialFormCard">
    <form id="materialForm">
      <input id="materialTitle" placeholder="Título">
      <input id="materialDescription" placeholder="Descrição">
      <input id="materialUrl" placeholder="Link">
      <select id="materialLevel">
        <option value="iniciante">Iniciante</option>
        <option value="vip">VIP</option>
      </select>
      <button type="submit">Cadastrar</button>
    </form>
  </div>

  <div id="materialsList"></div>
  <button id="refreshMaterialsBtn">Atualizar</button>
</section>

<!-- VIP -->
<section id="vip">
  <div id="vipLocked">Área VIP bloqueada</div>
  <div id="vipContent" class="hidden">Conteúdo VIP liberado</div>
</section>

<!-- ADMIN -->
<section id="admin">
  <div id="adminLocked">Acesso restrito</div>
  <div id="adminPanel" class="hidden">
    <div id="membersList"></div>
    <button id="refreshMembersBtn">Atualizar membros</button>
  </div>
</section>

<button id="logoutBtn">Sair</button>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- APP -->
<script src="app.js"></script>

</body>
</html>
